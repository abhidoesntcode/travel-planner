<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WanderAI - Your Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>

    <style>
         :root {
            --primary: #38BDF8;
            --bg: #F8FAFC;
            --text: #0F172A;
            --glass: rgba(255, 255, 255, 0.45);
            --border: rgba(255, 255, 255, 0.5);
            --item-bg: rgba(0, 0, 0, 0.03);
            --card-inner: #ffffff;
        }
        
        [data-theme='dark'] {
            --bg: #0F172A;
            --text: #F8FAFC;
            --glass: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --item-bg: rgba(255, 255, 255, 0.05);
            --card-inner: #1e293b;
        }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background-color 0.4s ease, color 0.4s ease;
        }
        
        #spotlight {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(56, 189, 248, 0.12) 0%, transparent 40%);
            z-index: 1;
        }
        
        .iphone-glass {
            background: var(--glass);
            backdrop-filter: blur(15px) saturate(180%);
            -webkit-backdrop-filter: blur(15px) saturate(180%);
            border: 1px solid var(--border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.04);
        }
        
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 0;
            border-bottom: 1px solid var(--border);
        }
        
        .diet-picker {
            background: var(--item-bg);
            padding: 4px;
            border-radius: 14px;
            display: flex;
            gap: 2px;
        }
        
        .diet-opt {
            padding: 6px 12px;
            border-radius: 11px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            transition: all 0.2s ease;
            cursor: pointer;
            opacity: 0.5;
        }
        
        .diet-opt.active {
            background: var(--card-inner);
            color: var(--primary);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            opacity: 1;
        }
        
        .iphone-btn {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }
    </style>
</head>

<body onmousemove="updateSpotlight(event)">
    <div id="spotlight"></div>

    <nav class="fixed top-0 w-full z-[100] px-6 py-8">
        <div class="max-w-7xl mx-auto flex justify-between items-center iphone-glass px-6 py-3 rounded-[32px] shadow-sm">
            <a href="index.html" class="flex items-center gap-3 text-2xl font-black">
                <i class="fa-solid fa-mountain-sun text-sky-400"></i>
                <span>Wander<span class="text-sky-400">AI</span></span>
            </a>
            <div class="flex items-center gap-4">
                <button onclick="toggleTheme()" class="w-10 h-10 iphone-btn rounded-xl flex items-center justify-center text-inherit">
                    <i id="themeIcon" class="fa-solid fa-moon"></i>
                </button>
                <div class="hidden md:flex gap-6 items-center">
                    <a href="index.html" class="text-sm font-bold opacity-60 hover:opacity-100 transition">Home</a>
                    <a href="saved-trips.html" class="text-sm font-bold opacity-60 hover:opacity-100 transition">Saved</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="pt-40 pb-20 px-6 max-w-2xl mx-auto relative z-10">
        <div class="flex flex-col items-center mb-10 text-center">
            <div class="relative mb-4">
                <div class="w-32 h-32 rounded-[40px] bg-sky-100 flex items-center justify-center border-4 border-white dark:border-slate-800 shadow-2xl overflow-hidden">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="Avatar" class="w-full h-full object-cover">
                </div>
                <button class="absolute bottom-0 right-0 w-10 h-10 bg-white dark:bg-slate-800 rounded-2xl shadow-lg flex items-center justify-center text-sky-500 border border-slate-100 dark:border-slate-700 hover:scale-110 transition">
                    <i class="fa-solid fa-camera text-sm"></i>
                </button>
            </div>
            <h2 class="text-3xl font-black tracking-tight">Arjun Sharma</h2>
            <p class="opacity-60 font-bold flex items-center gap-2">
                <i class="fa-solid fa-location-dot text-sky-400 text-xs"></i> New Delhi, India
            </p>
        </div>

        <div class="iphone-glass p-8 md:p-10 rounded-[48px] space-y-2">
            <h3 class="text-[10px] font-black opacity-40 uppercase tracking-[0.3em] mb-6">Account Settings</h3>

            <div class="setting-row">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-indian-rupee-sign text-sky-400 w-5"></i>
                    <span class="font-bold opacity-80">Display Currency</span>
                </div>
                <span class="text-sky-500 font-black">INR (₹)</span>
            </div>

            <div class="setting-row">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-leaf text-sky-400 w-5"></i>
                    <span class="font-bold opacity-80">Dietary Preference</span>
                </div>
                <div class="diet-picker">
                    <div class="diet-opt active" onclick="setDiet(this, 'Veg')">Veg</div>
                    <div class="diet-opt" onclick="setDiet(this, 'Non-Veg')">Non-Veg</div>
                    <div class="diet-opt" onclick="setDiet(this, 'Both')">Both</div>
                </div>
            </div>

            <div class="setting-row">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-passport text-sky-400 w-5"></i>
                    <span class="font-bold opacity-80">Travel Document</span>
                </div>
                <span class="opacity-40 font-bold italic">Aadhaar Linked</span>
            </div>

            <div class="setting-row border-none">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-bell text-sky-400 w-5"></i>
                    <span class="font-bold opacity-80">WhatsApp Updates</span>
                </div>
                <div id="waToggle" class="w-12 h-6 bg-emerald-400 rounded-full relative cursor-pointer transition-colors" onclick="toggleWhatsApp(this)">
                    <div class="dot absolute right-1 top-1 w-4 h-4 bg-white rounded-full transition-all"></div>
                </div>
            </div>

            <div class="pt-10">
                <button id="logoutBtn" onclick="handleLogout()" class="w-full bg-red-500/10 text-red-500 py-5 rounded-[24px] font-black text-sm uppercase tracking-[0.2em] transition-all duration-300 flex items-center justify-center gap-3 hover:bg-red-500 hover:text-white active:scale-95">
                    <i class="fa-solid fa-power-off"></i>
                    <span id="logoutText">Logout Session</span>
                </button>
                <p class="text-center text-[9px] opacity-40 font-bold uppercase tracking-widest mt-4">
                    Securely wipes data and ends session
                </p>
            </div>
        </div>
    </main>

    <script>
        function updateSpotlight(e) {
            document.body.style.setProperty('--x', e.clientX + 'px');
            document.body.style.setProperty('--y', e.clientY + 'px');
        }

        function setDiet(element, preference) {
            document.querySelectorAll('.diet-opt').forEach(opt => opt.classList.remove('active'));
            element.classList.add('active');
            localStorage.setItem('userDiet', preference);
        }

        function toggleWhatsApp(el) {
            const isOff = el.classList.toggle('bg-slate-400');
            const dot = el.querySelector('.dot');
            if (isOff) {
                el.classList.remove('bg-emerald-400');
                dot.style.right = 'auto';
                dot.style.left = '4px';
            } else {
                el.classList.add('bg-emerald-400');
                dot.style.left = 'auto';
                dot.style.right = '4px';
            }
        }

        function handleLogout() {
            const btn = document.getElementById('logoutBtn');
            const text = document.getElementById('logoutText');
            btn.style.pointerEvents = 'none';
            btn.classList.add('bg-red-600', 'text-white');
            text.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin"></i> Wiping Data...';

            localStorage.clear();
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1200);
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const target = current === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', target);
            localStorage.setItem('theme', target);
            updateThemeIcon(target);
        }

        function updateThemeIcon(theme) {
            const icon = document.getElementById('themeIcon');
            if (icon) {
                icon.className = theme === 'dark' ? 'fa-solid fa-sun text-yellow-400' : 'fa-solid fa-moon text-slate-500';
            }
        }
        updateThemeIcon(localStorage.getItem('theme') || 'light');
    </script>
</body>

</html>
