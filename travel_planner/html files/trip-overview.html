<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WanderAI - Trip Overview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
    <style>
         :root {
            --primary: #38BDF8;
            --bg: #F8FAFC;
            --text: #0F172A;
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.5);
            --card-inner: #ffffff;
            --chat-ai: #ffffff;
        }
        
        [data-theme='dark'] {
            --bg: #0F172A;
            --text: #F8FAFC;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --card-inner: #1e293b;
            --chat-ai: #334155;
        }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.4s ease, color 0.4s ease;
        }
        
        #spotlight {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(56, 189, 248, 0.12) 0%, transparent 40%);
            z-index: 1;
        }
        
        .iphone-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(15px) saturate(180%);
            -webkit-backdrop-filter: blur(15px) saturate(180%);
            border: 1px solid var(--glass-border);
            z-index: 10;
        }
        
        .stat-card {
            background: var(--card-inner);
            border-radius: 24px;
            padding: 1.5rem;
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
        }
        
        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }
        
        .custom-scroll::-webkit-scrollbar-thumb {
            background: rgba(56, 189, 248, 0.2);
            border-radius: 10px;
        }
    </style>
</head>

<body onmousemove="updateSpotlight(event)" class="flex flex-col">
    <div id="spotlight"></div>
    <nav class="w-full z-[100] px-6 py-4">
        <div class="max-w-[1600px] mx-auto flex justify-between items-center iphone-glass px-6 py-3 rounded-[24px] shadow-sm">
            <a href="index.html" class="flex items-center gap-3 text-2xl font-black">
                <i class="fa-solid fa-mountain-sun text-sky-400"></i>
                <span>Wander<span class="text-sky-400">AI</span></span>
            </a>
            <div class="flex items-center gap-4">
                <button onclick="toggleTheme()" class="w-10 h-10 iphone-glass rounded-xl flex items-center justify-center text-inherit">
                    <i id="themeIcon" class="fa-solid fa-moon"></i>
                </button>
                <a href="#" id="viewTimelineBtn" class="text-xs font-bold opacity-60 hover:opacity-100 transition">View Timeline</a>
                <button class="bg-[#25D366] text-white px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest flex items-center gap-2 hover:scale-105 transition shadow-lg shadow-emerald-500/20">
                    <i class="fa-brands fa-whatsapp"></i> Share Trip
                </button>
            </div>
        </div>
    </nav>
    <main class="flex flex-1 overflow-hidden px-6 pb-6 gap-6 relative z-10">
        <section class="flex-[1.5] iphone-glass rounded-[40px] flex flex-col overflow-hidden">
            <div class="p-8 border-b border-white/10 bg-white/5">
                <div class="flex justify-between items-start">
                    <div>
                        <h2 id="displayDest" class="text-4xl font-black tracking-tight uppercase">Loading...</h2>
                        <p id="displaySubtitle" class="opacity-60 font-bold text-sm mt-1 italic">Tailored Adventure</p>
                    </div>
                    <div class="text-right">
                        <span class="text-[10px] font-black text-sky-500 uppercase tracking-widest">Est. Total</span>
                        <p id="displayBudget" class="text-3xl font-black">₹0</p>
                    </div>
                </div>
            </div>
            <div class="flex-1 overflow-y-auto p-8 custom-scroll space-y-8">
                <div class="grid grid-cols-3 gap-4">
                    <div class="stat-card">
                        <i class="fa-solid fa-calendar-day text-sky-400 mb-2"></i>
                        <p class="text-[10px] font-black opacity-40 uppercase">Duration</p>
                        <p id="displayDuration" class="font-bold text-lg">-- Days</p>
                    </div>
                    <div class="stat-card">
                        <i class="fa-solid fa-masks-theater text-sky-400 mb-2"></i>
                        <p class="text-[10px] font-black opacity-40 uppercase">Vibe</p>
                        <p id="displayVibe" class="font-bold text-lg">--</p>
                    </div>
                    <div class="stat-card">
                        <i class="fa-solid fa-cloud-sun text-sky-400 mb-2"></i>
                        <p class="text-[10px] font-black opacity-40 uppercase">Best Time</p>
                        <p class="font-bold text-lg">All Year</p>
                    </div>
                </div>
                <div class="bg-sky-500/5 p-8 rounded-[32px] border border-sky-500/20">
                    <h4 class="text-xs font-black text-sky-500 uppercase tracking-widest mb-2">AI Insights</h4>
                    <p id="aiNote" class="text-sm opacity-70 leading-relaxed font-medium">Analyzing the best route for your journey...</p>
                </div>
            </div>
        </section>
        <section class="flex-1 iphone-glass rounded-[40px] flex flex-col overflow-hidden border-2 border-sky-400/20">
            <div class="p-6 border-b border-white/10 flex items-center gap-3 bg-white/5">
                <div class="w-10 h-10 rounded-xl bg-slate-900 flex items-center justify-center text-sky-400"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
                <div>
                    <h3 class="font-black text-sm">Trip Co-pilot</h3>
                    <p class="text-[10px] text-emerald-500 font-bold uppercase">Ready</p>
                </div>
            </div>
            <div class="flex-1 overflow-y-auto p-6 space-y-4 custom-scroll" id="chatContainer">
                <div id="aiWelcome" class="bg-white dark:bg-slate-800 p-4 rounded-2xl rounded-bl-sm text-xs font-medium shadow-sm leading-relaxed border border-white/10">Thinking...</div>
            </div>
            <div class="p-6 bg-white/5">
                <div class="relative">
                    <input type="text" placeholder="Adjust budget or duration..." class="w-full bg-white dark:bg-slate-800 border-none rounded-2xl py-4 pl-5 pr-14 text-xs font-bold shadow-inner outline-none">
                    <button class="absolute right-2 top-2 w-10 h-10 bg-sky-500 text-white rounded-xl flex items-center justify-center hover:scale-105 transition shadow-lg shadow-sky-400/30">
                        <i class="fa-solid fa-paper-plane text-xs"></i>
                    </button>
                </div>
            </div>
        </section>
    </main>
    <script>
        function updateSpotlight(e) {
            document.body.style.setProperty('--x', e.clientX + 'px');
            document.body.style.setProperty('--y', e.clientY + 'px');
        }
        async function loadTrip() {
            const id = new URLSearchParams(window.location.search).get('id');
            if (!id) return;
            document.getElementById('viewTimelineBtn').href = `itinerary.html?id=${id}`;
            const res = await fetch(`http://localhost:5000/api/trips/${id}`);
            const data = (await res.json()).data;
            document.getElementById('displayDest').innerText = data.destination;
            document.getElementById('displayBudget').innerText = `₹${Number(data.budget).toLocaleString('en-IN')}`;
            document.getElementById('displayDuration').innerText = `${data.days} Days`;
            document.getElementById('displayVibe').innerText = data.vibe;
            document.getElementById('aiWelcome').innerHTML = `I've mapped out your **${data.vibe}** escape to **${data.destination}**. Should we tweak anything?`;
            document.getElementById('aiNote').innerText = `We've optimized this ${data.days}-day trip to match your ${data.vibe} preferences perfectly.`;
        }

        function toggleTheme() {
            const target = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', target);
            localStorage.setItem('theme', target);
            document.getElementById('themeIcon').className = target === 'dark' ? 'fa-solid fa-sun text-yellow-400' : 'fa-solid fa-moon text-slate-500';
        }
        window.onload = loadTrip;
    </script>
</body>

</html>
